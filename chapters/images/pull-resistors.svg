<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <style>text{font-family:Arial,Microsoft YaHei,sans-serif;font-size:13px} .title{font-size:15px;font-weight:bold} .small{font-size:11px;fill:#666} .label{font-size:13px}</style>
  
  <text x="200" y="18" text-anchor="middle" class="title">上拉 / 下拉电阻</text>
  
  <!-- ⬅ 上拉 -->
  <text x="100" y="48" text-anchor="middle" fill="#2980b9" font-weight="bold">上拉电阻 Pull-Up</text>
  
  <!-- VCC -->
  <line x1="100" y1="60" x2="100" y2="110" stroke="#e74c3c" stroke-width="2"/>
  <text x="100" y="56" text-anchor="middle" fill="#e74c3c" font-size="11">3.3V</text>
  
  <!-- 电阻 -->
  <rect x="75" y="110" width="50" height="35" rx="3" fill="#2980b9" opacity="0.85"/>
  <text x="100" y="132" text-anchor="middle" fill="white" font-size="10">~45kΩ</text>
  
  <!-- 线 -->
  <line x1="100" y1="145" x2="100" y2="200" stroke="#333" stroke-width="2"/>
  
  <!-- GPIO -->
  <text x="100" y="220" text-anchor="middle" font-weight="bold">GPIO25</text>
  <text x="100" y="236" text-anchor="middle" class="small">读到 1(高)</text>
  
  <!-- 按键 -->
  <line x1="100" y1="245" x2="100" y2="280" stroke="#333" stroke-width="1.5"/>
  <rect x="75" y="280" width="50" height="22" rx="2" fill="#ddd" stroke="#999"/>
  <text x="100" y="295" text-anchor="middle" class="small">按键</text>
  <line x1="100" y1="302" x2="100" y2="330" stroke="#333" stroke-width="1.5"/>
  <text x="100" y="340" text-anchor="middle" class="small">GND</text>
  
  <text x="0" y="310" class="small">按下=读到0</text>
  
  <!-- ➡ 下拉 -->
  <text x="300" y="48" text-anchor="middle" fill="#8e44ad" font-weight="bold">下拉电阻 Pull-Down</text>
  
  <!-- VCC -->
  <line x1="300" y1="60" x2="300" y2="155" stroke="#e74c3c" stroke-width="2"/>
  <text x="300" y="56" text-anchor="middle" fill="#e74c3c" font-size="11">3.3V</text>
  
  <!-- 按键 -->
  <rect x="275" y="155" width="50" height="22" rx="2" fill="#ddd" stroke="#999"/>
  <text x="300" y="170" text-anchor="middle" class="small">按键</text>
  
  <line x1="300" y1="177" x2="300" y2="220" stroke="#333" stroke-width="2"/>
  
  <!-- GPIO -->
  <text x="300" y="240" text-anchor="middle" font-weight="bold">GPIO25</text>
  <text x="300" y="256" text-anchor="middle" class="small">读到 0(低)</text>
  
  <!-- 电阻 -->
  <line x1="300" y1="265" x2="300" y2="290" stroke="#333" stroke-width="1.5"/>
  <rect x="275" y="290" width="50" height="35" rx="3" fill="#8e44ad" opacity="0.85"/>
  <text x="300" y="312" text-anchor="middle" fill="white" font-size="10">~45kΩ</text>
  
  <line x1="300" y1="325" x2="300" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="342" text-anchor="middle" class="small">GND</text>
</svg>